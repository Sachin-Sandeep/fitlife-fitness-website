<!--
Page Purpose:
This page allows users to contact FitLife.
Users can enter their name, email, and message.
-->

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Make website responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Contact Us | FitLife</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="contact-page">

    <!-- Navigation Bar -->
    <header>

        <nav class="navbar">

            <!-- Website logo -->
            <div class="logo">
                FitLife
            </div>

            <!-- Navigation menu -->
            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="workout.html">Workouts</a></li>

                <li><a href="bmi.html">BMI Calculator</a></li>

                <li><a href="contact.html">Contact</a></li>

            </ul>

        </nav>

    </header>

    <!-- Contact Section -->
    <section class="contact-section">

        <!-- Main heading -->
        <h1>Contact Us</h1>

        <p>
            Feel free to contact us for fitness advice and support.
        </p>

        <!-- Contact Form -->
        <form>

            <!-- Name input -->
            <input
                type="text"
                placeholder="Enter Your Name"
                required>

            <br><br>

            <!-- Email input -->
            <input
                type="email"
                placeholder="Enter Your Email"
                required>

            <br><br>

            <!-- Message input -->
            <textarea
                rows="5"
                cols="30"
                placeholder="Enter Your Message"
                required>
            </textarea>

            <br><br>

            <!-- Submit button -->
            <button type="submit">
                Send Message
            </button>

        </form>

    </section>

    <!-- Contact Information -->
    <section class="contact-info">

        <h2>Contact Information</h2>

        <p>Email: ict24022@std.uwu.ac.lk.com</p>

        <p>Phone: +94 77 615 83 67</p>

        <p>Address: Colombo, Sri Lanka</p>

    </section>

    <!-- Footer -->
    <footer>

        <p>
            &copy; 2026 FitLife. All Rights Reserved.
        </p>

    </footer>

</body>

</html>
