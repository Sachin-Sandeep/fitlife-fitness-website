<!--
Page Purpose:
This page allows users to calculate their Body Mass Index (BMI).
Users enter their height and weight to check their health status.
-->

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Make website responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>BMI Calculator | FitLife</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bmi-page">

    <!-- Navigation Bar -->
    <header>

        <nav class="navbar">

            <!-- Website logo -->
            <div class="logo">
                FitLife
            </div>

            <!-- Navigation links -->
            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="workout.html">Workouts</a></li>

                <li><a href="bmi.html">BMI Calculator</a></li>

                <li><a href="contact.html">Contact</a></li>

            </ul>

        </nav>

    </header>

    
    <!-- BMI Calculator Section -->

    <h1 class="bmi-title">
        BMI Calculator
    </h1>

    <p class="bmi-description">
        Check your Body Mass Index and health category.
    </p>

    <section class="bmi-container">

        <!-- Left Side -->

        <div class="input-box">

            <h2>Enter Your Details</h2>

            <input
                type="number"
                id="height"
                placeholder="Height (cm)">

            <input
                type="number"
                id="weight"
                placeholder="Weight (kg)">

            <button onclick="calculateBMI()">
                Calculate BMI
            </button>

        </div>

        <!-- Center Result Card -->

        <div class="result-box">

            <h2>Your BMI</h2>

            <div class="bmi-circle">

                <div id="bmi-score">
                    --
                </div>
            
            </div>

            <p id="result">
                Enter your details
            </p>

        </div>

        <!-- Right Side Categories -->

        <div class="category-box">

            <div class="category under">
                Underweight
            </div>

            <div class="category healthy">
                Healthy
            </div>

            <div class="category over">
                Overweight
            </div>

            <div class="category obese">
                Obese
            </div>

        </div>

    </section>

        <!-- Footer -->
        <footer>

            <p>
                &copy; 2026 FitLife. All Rights Reserved.
            </p>

        </footer>

        <!-- Connect JavaScript file -->
        <script src="js/script.js"></script>

    </body>

    </html>
